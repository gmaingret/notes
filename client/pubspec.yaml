name: notes
description: Self-hosted personal outliner — infinite nested bullets with offline sync.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Local database (Android: sqflite, Web: sqlite3 WASM + OPFS)
  drift: ^2.26.1
  sqflite: ^2.4.2
  sqlite3_flutter_libs: ^0.5.31

  # HTTP client
  dio: ^5.8.0+1

  # Auth
  google_sign_in: ^6.2.2
  flutter_secure_storage: ^9.2.4

  # Routing
  go_router: ^15.1.2

  # Network connectivity
  connectivity_plus: ^6.1.4

  # Utilities
  uuid: ^4.5.1
  path: ^1.9.0
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.15
  drift_dev: ^2.26.1
  riverpod_generator: ^2.6.5

  # Mocking
  mocktail: ^1.0.4

  # Lints
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
