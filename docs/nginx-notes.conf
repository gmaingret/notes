# nginx config block to add to the existing nginx at 192.168.1.204
# Greg adds this manually — it is NOT deployed automatically.
#
# Replace:
#   notes.yourdomain.lan → your actual hostname
#   192.168.1.XXX        → IP address of the Docker host
#   /etc/nginx/certs/... → paths to your existing SSL cert + key

server {
    listen 443 ssl;
    server_name notes.yourdomain.lan;

    # Reference your existing SSL cert — self-signed or from your local CA
    ssl_certificate     /etc/nginx/certs/yourdomain.crt;
    ssl_certificate_key /etc/nginx/certs/yourdomain.key;

    # Allow large attachment uploads (images, audio, files)
    client_max_body_size 100M;

    location / {
        proxy_pass         http://192.168.1.XXX:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Avoid timeouts on large file uploads
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name notes.yourdomain.lan;
    return 301 https://$host$request_uri;
}
